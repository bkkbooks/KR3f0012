body:
  text: 天問畧天文算法類一推􅇍之屬提要臣等謹案天問畧一卷明萬厯乙夘西洋人陽瑪諾撰是書於諸天重數七政部位太陽節氣晝夜永短交食本原地影麤細䝉氣映漾矇影留光皆設為問答反覆以明其義末載矇影刻分表并詳解晦朔弦望交食淺深之故亦皆具有度説指證詳明與熊三拔所著表度説次第相承淺深相繫蓋互為表裏之書前有陽瑪諾自序其説乃舍其本術而盛稱所謂天主者且謂第十二重不動之天為諸聖之所居天堂之所在信奉天主者乃得升之以歆動下愚蓋欲借推測之有騐以證天主天堂之誣其用意極為詭譎然其考騐天象則實較古法為善今置其荒誕售欺之説而但取其精宻有據之術削去原序以免熒聴其書中間涉妄謬者刋之則文義或不相續姑存其舊而闢其邪説如右焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀欽定四庫全書天問畧明陽瑪諾撰天有幾重及七政本位問貴邦多習歴法敢問太陽太隂之説何居且天有幾重太陽太隂位置安屬曰敝國歴家詳論此理設十二重焉最髙者即第十二重為天主上帝諸神聖處永静不動廣大無比即天堂也其内第十一重為宗動天其第十第九動絶微僅可推算而甚微妙故先論九重未及十二也十二重天其形皆圓各安本所各層相包如裹葱頭日月五星列宿在其體内如木節在板一定不移各因本天之動而動焉問人居地上依其目力所及獨見一重自東而西一日一週耳今設十二重何徵曰萬物或静或動静者獨有一静是静無動動者獨有一動是動無静終古以來未有一息之内能動静互現者也未有二動並出能此動東去彼動西行者也于其運動相反可知其體有同異矣今恒見日月五星列宿其運動各各相反便知所麗之天原非一重日月相反運動于朔望見之朔日月共躔一度望日月相逺半周月毎日自西而東行十三度有竒日每日約行一度五星所離日月列宿毎日各異其相近相逺亦各時刻不同因知各有其本重所麗之天可證五星之有五重天也列宿諸星相近相逺終古恒同因知其所麗天終古恒同而可證其有第八重天也夫日月諸星本動之天皆自西而東也天左旋日月五星右行貴國先儒亦已晰之矣今舉目而視之日生于東沒于西月與諸星隨之以旋其自東而西者又昭昭然此必有一天焉為之主宰為之牽屬而日月諸星之天因之則九重天是也故自東而西者宗動天也自西而東者日月諸星之天也自西而東者日月諸星之本動也自東而西者日月諸星之帶動也明乎二動得天體也第九第十重天其説甚長宜有專書備論問自東而西自西而東二動既相反矣今宗動天自東而西日月諸星之天自西而東何不為相反運動哉曰所謂相反運動是一物自發二動非有自外轉動如一人在船中船順風自東而西人逆行自西而東則自西而東人之動也自東而西人之因船帶動也雖有二動非相反動又如車輪上有蟻行自南而北其輪之轉自北而南實見此蟻行有二動而非相反何也一從自動一從外帶故也日月諸星之動何不其然問今觀有異運動從星而出星行于天如鳥于空中如魚于水内矣天何所沓九重焉分曰魚鳥一時獨有一動諸星之動則非一也盖星行一時之際自西而東亦自東而西焉所謂相反運動也特有九重天以斡之故非一物自發二動耳且天體甚堅非水可比胡能穿之兩天之連不容一物又焉分哉問既有十二重天敢問太陽何位曰自下往上在第四位七政之中也日得其中為其本所光及餘政暄及下地故也為其本所者七政之中日最貴尊貴尊之物得其中位一定之勢也光及餘政者星月無光恒借日之光以為光試觀月之于日合則魄逺則弦對則望隨其近逺以為明闇焉五星列宿亦復如是盖日居其中適得上下照映也暄及下地者日光在中下濟萬物氣以暄之乃得調和若居最上則温煖不及諸物難以滋生若居最下則燥熱太甚諸物受其暵損故日得中正中和之理萬物之宜也諸天本位可視右圖日天本動及日距赤道度分赤道則第十一重宗動天之分中也周天三百六十度去南極九十度去北極亦九十度為赤道所謂天之中而其南北二極天之極也黄道則第四重日天之分中也周天三百六十度南北亦各距九十度為黄道所謂日天之中也日天本動自西而東其南北二極離宗動天赤道之極二十三度半黄道以南以北離赤道二十三度半為冬夏至黄道以東以西與赤道相交為春秋分如上圖甲乙為赤道宗動天之中丙丁為赤道南北二極己戊為黄道日天之中庚辛為黄道南北二極日天庚辛二極離宗動天丙丁二極各二十三度半日天己戊黄道離宗動天甲乙赤道二十三度半而為冬夏至黄道赤道相交于壬癸而為春秋分宗動天自東而西一日一周因而帶動其下十重諸天亦自東而西一日一周日一日約行一度一嵗一周故自戊冬至至壬春分為九十度九十日自壬春分至己夏至自己夏至至癸秋分自癸秋分至戊冬至亦然畧論三百六十五日有竒一周天也宗動天自東而西一日一周即此周日之間日之自西而東自行一度人只見其自東而西左旋而已初不見其右行者何也以其外動之自東而西者甚疾内動之自西而東者甚遲故也然而因其近逺天頂可以證之春分以後日過赤道北而上秋分以後日過赤道南而下其上其下非日有偏行縁與宗動天不同極耳試看上圖庚辛為日天之極若日輪在戊冬至以至壬春分漸上以至己夏至亦上過己夏至至癸秋分即下至戊冬至亦下上下由于本天之極原離赤道之極二十三度半故日輪居本天之中亦離赤道南北二十三度半而春秋分必相交乃知氣不參差無以成化時不寒暑無以合序物不錯雜無以生文儻日天二極與宗動天同則日動恒在赤道下絶無距度安得有東西運行之異以行變化而稱貞觀貞明之體哉日輪正居日天之中日天動而日輪亦動日天運行之一周如于宗動天畫一道焉所謂黄道也終古如是故日輪恒躔黄道一道不出入于南北界非如月五星之出入于十二度内也其上下四時各有定度不稍前後也黄道周天三百六十度分為四分毎分九十度為四象限又一象限分六分毎分十五度為一節氣共二十四節氣如上圖自冬至至春分則周天象限也分得九十度每節氣十五度則六節氣也自春分至夏至自夏至至秋分自秋分至冬至亦然日輪躔冬至初度至九十度在赤道外而最逺于天頂故自立冬至立春皆寒而冬至在其九十度之中故其寒尤甚自立春至立夏因日漸近赤道而稍近于天頂故其時暖于冬至凉于夏至正交赤道謂春分也自立夏至立秋因日在赤道上而夏至則最近于天頂故其時甚熱自立秋至立冬日漸下而離天頂其時稍冷于夏至甚煖于春分亦交赤道所謂秋分也夫春秋分皆躔二道之交其離天頂同則其成寒暑宜亦同縁春日隂氣塞滿大地日光雖照難成温熱秋日陽氣焦灼無所不暴日輪雖下難成寒氣故春秋二季日離天頂並同而寒暑不同也日自春分至夏至行九十度為六節氣自夏至至秋分亦然四象限雖各行九十度而其距赤道之緯度則非九十度游移不出二十三度半也故九十度為黄道自東而西之度數而二十三度半為黄道距赤道南北之度數也盖春秋分日日躔二道之交過春分日離赤道向夏至而漸逺赤道過此則又漸近赤道矣自秋分至冬至自冬至至春分亦然如左圖甲乙為赤道丙丁為冬夏二至距赤道二十三度半假如日輪在春分則于赤道無距度自春分至清明則日行十五度而其距度非十五度乃六度十九分也自立夏至小滿此十五日之間其逺非六度而為四度也自芒種至夏至亦非四度而為一度弱也故近交差多近至差少而其差非同也欲知每節氣及毎日日躔黄道距赤道幾何度分依上圖可得焉假如清明初日日距赤道度分上是清明初度下是白露初度兩界相對次用一線或界尺隱取兩界循直線視所當丙丁線度分得六度因知清明白露初日日距赤道六度也又清明五日處暑十日其離甲乙赤道亦同故檢取清明五度處暑十度為兩界次依法視于丙丁得七度強即其距度也餘倣此問太陽平行一日一度一嵗三百六十五度自春分至秋分半嵗宜行一百八十二度半半周天自秋分至春分亦然今不其然大綂厯太陽自春分至秋分有空度自秋分至春分有隔度即今甲寅年春分至秋分四月二十二日空一度五月二十日六月十四日亦有空度秋分至春分十月十一日二十二日皆隔一度十一月十二日十二月十五日亦隔一度其非平行何也曰此理甚廣非可易罄凡求日距赤道度分測北極出地多寡定諸節氣眞日算二食之眞時刻皆以此理為最急也今姑舉其略依上論七政各有本天所麗各有異動然其本天之中心不與地之中心同一心也故其行轉于地體之面一周自非可謂平行也宗動天之黄道心與地球心一也則其行于地面一周恒為平行矣則七政之天雖不平行轉于地體之面然于其本天之中心平行轉也如上圖甲為宗動天之黄道乙為太陽之天丙為太陽天之中心丁為地及宗動天之中心則視宗動天與地球同心其上半天于其下半天實為平分故其行轉于地面必亦平行也日天中心乃與地中心不同一處其上半天與其下半天亦非平分故其轉行于地面必非平行盖日行從戊過乙至己在地球止行其半周分在太陽本天則己行大半周矣此以上之黄道亦然故自春分至秋分太陽之天大分在上自秋分至春分其在下之分不及半也自春分至秋分行十二節氣半周天而多八度自秋分至春分以黄道論亦行十二節氣而于本天則其行不及半周也因知日行半黄道自春分至秋分必遲而自秋分至春分必速此非日天不平行以與宗動天黄道非同心故也問日天此理何以徵乎曰其所以然自有别論今獨徵定節氣之日也西國厯家測騐節氣測得太陽自春分至秋分必須一百八十七日自秋分至春分止須一百七十八日大綂厯半周共有一百八十二度故太陽行夏至節氣以其本天毎日一度一百八十七日則行一百八十七度而黄道半周原當行一百八十二度以毎日一度算之為有餘故于夏至節氣有空度日行冬至節氣黄道自秋分至春分亦當行一百八十二度而本天止行一百七十八日乃依毎日一度之算而不足故有隔日乃知春分至秋分黄道一百八十二度本天行一百八十七日日多度寡必須空日可以合之秋分至春分黄道一百八十二度本天一百七十八日度多日寡必須隔日可以合之因此冬夏節氣于周天度數亦不平分盖節氣太陽行黄道之十五度也日行夏節氣其所行十五日而于黄道非行十五度故不可以十五日定其一節也冬節氣亦然欲得其眞確須依上法而定其限焉故于夏有以十六日日行黄道之十五度而一節氣足于冬有以十四日日行黄道之十五度而一節氣足問大綂厯自春分至秋分恒算得一百八十二日非一百八十七日也如甲寅年春分日為二月十四日秋分日為八月十八日乃扣至一百八十二日足者自秋分至春分亦然其皆為平分何也曰定節氣法有二其一以太陽所行于本天度分其一以所行黄道度分大綂厯定節氣非依黄道度分乃以日行本天度分定之若論黄道度則所謂春秋分必在日躔二道之交今大綂厯恒前三日而得春分後三日而得秋分日輪于本天已行至一百八十二日然實未躔二道之交故諸節氣俱因此有前後西洋厯家則依太陽所行黄道度分而定諸節氣矣此法以得眞確本日甚便盖測騐以得日輪髙下為急而日輪髙下由于其所躔黄道度分也日蝕問日蝕所以曰日蝕非日失其光乃月掩其光也月之天在日天之下朔時月輪正過日輪之下南北同經東西同緯故揜其光若有失之耳如上圖甲為日乙為月丙為人居地面月輪隔在其中使日光不能照地面而人目不能見日輪也因知日食非各處共有之或一處見食别處見光或一處全食别處半食皆目隨地異也聞貴國先時一年日食司天言當幾分草澤言當幾分後卒如草澤言説者以為筭法疎宻使然實不爾也如右圖丙地面乙月輪甲日輪居丁者正見月于日故見全食居戊者斜見月于日故見半日食居己者不見月于日故全不見食如欲得日食時刻最凖先須得七政經緯度及正斜視法不然即交食分數測騐躔度悉不可算悉不可定故吾國厯家窮究此理以為厯凖别有備論今特畧言食理也試觀居房内者房中有燭以照四方若于東方有揜光者必坐東者不見其光而坐南北西方者得光也各方如是如滅其光則居諸房内者四方見燭無光矣與食同理也若月食則所食全缺分秒萬人萬目共作是觀别無同異與日不同問日蝕由于月揜其光凡毎朔時日月同度又正過其下宜皆得食今不盡然何也曰日躔惟一黄道終古無出其外也月于黄道有時在南在北故月道半出黄道北半出黄道南而為南北二交吾國所謂龍頭龍尾是也朔時若月在二交之外或南或北與日非經緯同度不能揜日光也南北為經東西為緯凡是朔日經度必同如更同緯度適在二交之上乃能揜其光而食耳如左圖月道交黄道于龍頭龍尾甲為月道在黄道南丙在北試使月朔時在龍頭則經緯同度月正過日輪之下揜其光而食焉如朔時月在甲黄道之南日乃在乙黄道之上而緯不同度則日在北月在南矣故不食也問日食若因月天在日天之下則水星金星天亦在日天之下而不見揜其光且月天在金水二星之下月亦宜揜其光而金水有食如日矣今其食不顯何也曰水星金星雖正過日輪之下而有與日同度時然金星大于水星而日大于金星一百倍二星之體比日體甚小豈能揜其光而使人不見日也吾國厯家遇金水二星與日同度恒見日輪中有黒㸃以星體不能全揜日體故也月輪正過二星之下亦宜揜其星光使人不見今不顯其食如日者非月不能揜之乃二星之光甚微其體甚小故不明顯也問天地渾儀説曰地球大于金星三十六倍又二十七分之一大於月輪三十八倍又三分之一是金星大於月輪也夫月球能揜日光則金星更大亦何不揜日光乎曰凡物以形相揜非惟論其大小又當計其逺近盖人目視物之時自目至物之體射兩直線為直角形故愈近于目其物雖小而徑愈大愈逺于目其物雖大而徑愈小如上圖甲為人目庚為物體甲乙甲巳為人目所射兩直線則徑愈近愈小愈逺愈大故戊大于丁而丁大于丙也試以人手隔目手愈近于目則愈揜物體矣是故金星雖大於月乃在月天之上去人目甚逺故不能揜日光也月雖小于金星乃在金星天之下去人目最近故能揜日光也此其理也問日大於月固矣日輪較地球不知其大有幾曰吾國厯家著明此理有論甚廣測七政髙下及大小之度分有器甚凖日大於地一百六十五倍又八分之三欲徵之宜知圓光照圓體之影也圓光若照圓體同大其影廣恒等而無窮若照圓體更大其影漸大而亦無窮若照圓體更小其影漸小而有盡試觀上圖甲為圓光乙為圓體丙為體影第一圖甲圓與乙圓體相等丙影亦等無窮盡矣第二圖甲圓光大于乙圓體丙影漸小而有盡矣第三圖甲圓光小于乙圓體丙影漸寛大而亦無窮矣太陽照地之時地影非恒等亦非漸大譬之物影蓋為漸小而有盡如第二圖也則以日輪圓光大于地形照地之影漸鋭而小至有盡焉甚明也凡星月無光借日之光太陽照及其體則光生焉不然則否儻日與地等地或更大焉則其影為無窮之影宜射䕃直過諸星之天必見諸星有食焉者矣今惟地體甚小鋭影有盡不到諸星之天故日光無碍照及木火土以及列宿諸天而諸星恒明光無朦也其地影之盡可過第一第二重天至第三重天而不及第四重天所以月因地影得食而諸星不食也地球一周三百六十度每度二百五十里日天一周亦三百六十度其每一度有數萬餘里焉吾國厯家有器量得日天之度毎半度為日一全徑因知其圓形亦得數萬餘里而非地形可比譬如山髙二十餘里上有人焉居下者視之如小鳥也日天之髙自地面至太陽中心相隔一千六百萬餘里今視日輪如小車輪猶之二十里髙山視人如鳥矣問太陽早晚出入時近于地平見大午時近于天頂見小何也曰地球懸于空際居中無著其四際離天諸方同一無近逺也以理論之其在東西出入方也太陽離地凡一千六百萬餘里矣而人立地面或自東視西或自西視東半徑幾一萬五千里焉以一千六百萬餘里又加以一萬五千里人之視日宜小也日在午方從下視上止一千六百萬餘里人之視日宜大也今宜小而反大宜大而反小者此非由于地之逺近也濕氣使然也盖夜中水氣恒上騰氣行空中悉成濕性濕以太陽自下而上映帶而來晃漾焉蓬勃焉人望之以為如是其大耳若太陽當空浮翳盡掃無所映隔眞體明净較之旦暮為小凡月與諸星見于地平必有濕氣障隔爾時所見亦必大于午時試觀水中所見或石或木必大于水外者皆濕性之勢也問人在地面視東視西者半徑各得一萬五千里豈以人之所立恰在地中乎曰地是圓體人之所立無論逺近中邉從其所立分之各得一半晝夜時刻隨北極出地各有長短問晝夜長短不一時刻亦異何也曰晝夜長短由于太陽及南北極出入地平也北極出地即夏至晝長夜短冬至晝短夜長南極出地反是其時勢異也為此夏至為彼冬至故晝短夜長為此冬至為彼夏至故晝長夜短南北二極與地平則其地晝夜恒平故晝夜長短由于太陽及極出入地也南北為緯度東西為經度各一周三百六十度人在地面凡居經度一帶之内者其晝夜長短恒同其日出入及晝夜時刻則異盖經度之自東而西者人之所居或東或西雖各不同而緯度之三十度者皆為三十度四十度者皆為四十度也此同緯度者也若緯度之異者自赤道以至極下其晝夜長短各異矣如左圖地為圓體懸于空際上下四旁皆有人居四方之人各以所居子午線為午時太陽在東方甲居東方者為午時日輪在其天頂故也乙居西方者即為夘時日輪至天頂須三時故也丙亦居西方者即為子時日輪以至天頂須六時故也諸地相去自東而西莫不皆然地球自南而北三百六十度一周毎一度二百五十里日輪毎刻平行天度三度四十五分如兩地相去九百三十七里半則相隔為一刻相去七千五百里則相隔為一時因知居東方者若得午時自此逐漸往西即為巳為辰為夘為寅為丑為子天下自東而西時刻各異各以日輪到本處子午線為午正初刻晝夜長短恒同者盖以北極出地多寡定為時刻多少所以自東而西一帶但經度相同地方其離北極皆同則晝夜長短亦同南北緯度自赤道至極下晝夜時刻隨地各有長短盖居赤道下者以赤道為天頂而其南北二極正與地面相平地平之交于諸節氣線皆當正中故其晝夜長短恒平也北極出地則地平之交節氣非其正中矣故所分上下亦非平分夏至則其線大分在上而晝長夜短冬至則其線小分在上而晝短夜長今欲知赤道之下晝夜常平如右圖即見人居此地以赤道為天頂又南北極不出入地次見地平線相交于諸節氣之線正當中而六時在地平上六時在下故太陽或行夏至或冬至或春秋分線上必六時在地面上而為晝六時在下而為夜其諸節氣日出必夘正初刻日入必酉正初刻即晝夜常平可知也但其曚曨影稍異冬夏二至略長于春秋分之時此有别論今不詳之自赤道北行二百五十里見北極出地一度赤道離天頂南亦一度若行二千五百里即北極出地南極入地赤道離天頂南俱差十度自赤道下至北極下毎行二百五十里皆差一度其赤道線偏在天頂南即諸節氣線亦偏于南不與地平線相交于正中以為平分故晝夜時刻各有長短焉晝夜長短皆從北極出地而生今以北極出地四十度作法餘可推焉如上圖北極出地南極入地四十度赤道在天頂南亦四十度地平線交于諸節氣線非其正中其交夏至線也于寅正二刻四分故晝長五十九刻七分毎日九十六刻其餘三十六刻八分為夜甚短因其線大半在地平上故自春分經夏至至秋分皆為晝長而夜短地平線交冬至在辰初一刻十一分故夜長五十九刻七分其餘三十六刻八分為晝甚短因其線大半在地平下故自秋分厯冬至至春分皆為夜長而晝短可知晝夜長短由于南北二極出入地也如右圖欲知順天府毎節氣晝夜刻各幾何則視本日節氣在地平線上時刻即書在下時刻即夜也假如于夏至線視地平線交于寅正二刻以上得二十九刻十一分是從日出至午正初刻數加一倍即從午正初至日入得五十九刻七分為晝刻分所餘刻分即夜刻分也諸節氣亦然又欲知日出入時刻即視地平線于本節氣相交某時刻即得欲知隨節氣朦朧影刻各幾何亦視本節氣自朦朧線以上至地平線皆黄昏昧爽刻分也凡晝夜長短時刻由于南北極出入地與所居緯度之不同也天頂近于赤道則北極出地度數少即晝夜長短亦少天頂逺于赤道則北極出地度分多即晝夜長短亦多故應天府北極出地三十二度半順天府四十度強即多七度半其晝夜長短亦自不同欲知所差幾何試觀北極出地四十度強圖地平線交夏至線于寅正二刻四分故順天府夏至晝長五十九刻七分觀北極出地三十二度半圖地平線交夏至線于寅正三刻十二分故應天府夏至晝長五十六刻六分計差三刻其餘節氣以法對之亦然又欲知日出入及曚曨影時刻各異如上法可求因上三圖即知晝夜時刻隨北極出地各有長短北極不出地因赤道為天頂左右節氣半在地上半在地下故晝夜必恒平也北極出地或二十度其赤道在天頂南二十度左右節氣皆偏于南二十度故晝夜必有長短也盖人居赤道下者恒見半天若北極出地二十度南極必入地二十度人居赤道北二十度者其所見天北方必多二十度而能見赤道下者之所不見南方必少二十度而不見赤道下者之所得見人恒得見半天故也夏至節氣在赤道北其二十度之分現在地面上故得晝長冬至在赤道南其二十度之分隱在地面下故得晝短其北極出地三十四十五十度者其理並同獨至出地六十七度半則不同也試觀渾儀若北極出地十度夏至晝長二刻若出二十度長五刻出三十度長八刻出四十度長十二刻出五十度長十八刻出六十度長二十六刻出六十七度長四十八刻其長四十八刻者夏至線不交地平而全見在地平上冬至全在地平下故夏至日太陽行地面上不入地平晝長九十六刻無夜冬至日太陽行地面下不出地平夜長九十六刻無晝北極出地七十度五夏節氣線小滿芒種夏至小暑大暑皆在地平上五冬節氣線小雪大雪冬至小寒大寒皆在地平下其北極出地七十度者從小滿厯夏至夏至厯大暑凡六十日太陽斜行地上不入地下即六十日全為晝無夜小雪以後厯冬至冬至歴大寒凡六十日太陽斜行地下不出地上即六十日全為夜無晝若北極出地八十度則夏十節氣皆在地平上冬在下晝夜長短全為百二十餘日若北極出地九十度則此地以北極為天頂以赤道為地平赤道北諸節氣全在地平上赤道南諸節氣全在地平下而半年為晝半年為夜矣試觀上圖北極在天頂赤道為地平從春分厯夏至迄秋分諸節氣在地平上從秋分歴冬至迄春分諸節氣在地平下即見此地日躔赤道春分以後出地日輪漸髙至夏至二十三度半以後漸下至秋分故半年恒周行于地平之上而全為一晝秋分以後入地日輪漸下至冬至二十三度半以後漸髙至春分故半年恒周行于地平之下而全為一夜日出入地平十八度内皆為䑃朧影時刻故此地春分以前月半為昧爽秋分以後月半為黄昏也或曰一年半為晝半為夜何以証之曰吾西國人親所經厯其愈近北極者夏至日晝愈長夜愈短夏至日有全十二時為晝有全三十日為晝全六十日為晝全六月為晝厯厯身涉不可疑也依渾天儀論之其理不得不然也試于中國亦可見焉中國本境自南十八度起至北四十二度止人從最南北行毎二百五十里必更一度漸北漸移夏至日晝長夜短而京師北土之夏至日長于廣東南土之夏至廣州北極出地二十三度半夏至日五十三刻十一分為晝餘四十二刻四分為夜又以江西較之南昌府北極出地二十九度夏至日五十五刻七分為晝餘四十刻八分為夜視廣東晝夜長短差二刻南京北極出地三十二度半夏至日五十六刻六分為晝餘三十九刻九分為夜視廣東晝夜長短差三刻視江西差一刻山東濟南府北極出地三十七度晝長五十八刻四分餘為夜即晝長于廣東五刻于江西三刻于南京二刻京師北極出地四十度其晝夜長短所差愈多從此可推自十八度以至四十二度各處不同又推知自四十二度至九十度晝夜漸長漸短以至半年為晝半年為夜足徵矣晝夜長短日出入時刻朦朧影刻分皆以北極出地多寡及所交節氣之日為凖宜隨地随氣立算不可執一處以槩他方也故為列圖如左圖中最上横書一行為諸節氣本日從冬至至夏至次第一直行為各省所宜用本圖及其地北極出地多寡次得日出一行此行横書作二行一為日出刻數一為日出分數次日入一行及晝夜長短朦朧影其行各横書作二行一為刻數一為分數假如欲知順天府立冬或立春日日出入時刻晝夜長短朦朧影刻分則視左各圖而例得第一圖為其本圖次檢取圖中立冬本行及右日出行相對得夘正三刻十三分其餘相對如是而得日入申正四刻二分晝長短四十刻四分夜長短五十五刻十一分朦朧影六刻七分其餘節氣亦然餘圖視法亦然依西厯毎日九十六刻毎時八刻算北京及鄰近地方晝夜長短日出日入曚曨影刻分南京及鄰近地方晝夜長短日出日入曚曨影刻分山東省城及鄰近地方晝夜長短日出日入矇曨影刻分山西省城及鄰近地方晝夜長短日出日入曚曨影刻分陜西省城及鄰近地方晝夜長短日出日入曚曨影刻分河南省城及鄰近地方晝夜長短日出日入曚曨影刻分浙江省城及鄰近地方晝夜長短日出日入曚曨影刻分江西省城及鄰近地方晝夜長短日出日入曚曨影刻分湖廣省城及鄰近地方晝夜長短日出日入曚曨影刻分四川省城及鄰近地方晝夜長短日出日入曚曨影刻分福建省城及鄰近地方晝夜長短日出日入曚曨影刻分廣東省城及鄰近地方晝夜長短日出日入曚曨影刻分廣西省城及鄰近地方晝夜長短日出日入曚曨影刻分雲南省城及鄰近地方晝夜長短日出日入曚曨影刻分貴州省城及鄰近地方晝夜長短日出日入曚曨影刻分月天為第一重天及月本動問太隂在何重天曰第一重天最近於地者是也吾徵之日食由于月掩其光且恒見月體能揜水與金星則月天必居其下矣依表影之理亦可徵也立表取影光體逺于地面得景短光體近于地面得景長今西國厯家以表景測騐日月髙下日輪髙于地平五十度月輪亦髙于地平五十度然而所得日光表景則短月光表景則長也如左圖甲乙為地平丙為表視日輪髙于地平五十度月輪亦髙五十度即日光從表端至丁月光從表端至戊戊影長于丁影明也是知月天必在其下而近于地面也月天南北二極各離宗動天之極二十三度半與日天同故月行亦交黄道而其躔黄道非如日輪也日輪恒行黄道一路月輪之路非一乃出入黄道南北五度故中國厯家曰月有九道其出入相交處謂之龍頭龍尾詳見前日食圖月本動自西而東毎日約行十三度有竒朔時日月同度至第三日及第四日即見月輪在日輪之東至上弦離太陽九十度望日正相對百八十度半周天非月行最疾何能離日如是乎然其自東而西日月諸星其動並同無有疾遲以其皆為宗動天所帶故也問月光每日不同何故曰月體及諸星之體與本天之體一也第天體透光如玻瓈而月與星之體堅凝不能透光耳故日光全照月天天體直透不能發光月星堅凝闕無光月在丁雖日光皆照其半然大半居天内目力獨見其小分也月在戊在已亦然月在庚乃正相對于日輪日光全照其向下之半目力得見而其向上者無光人目俱所不及焉故望日月光滿全也過望日後目力漸不能及月光漸消以至無光焉問月借日光光有消長乃諸星之光恒見滿圓而無消長何也曰諸星與月其借日光不同也月天在日天之下月受其光近遠一異消長不同諸星之天居日天之上日光照星恒照其下面雖或近或遠于日而其下面恒有光故居地上者視星恒有光也如左圖甲為日輪乙為諸星之天居日天之上丁為地形丙為地影即見日光恒照諸星下面而居地上者恒見其下面有光且月食由于地影地影之鋭有盡不及諸星之天故諸星之光不朦也月食問望日月與日正對則月光當滿圓矣然而或全無光或一分有光一分無光其故何也曰地球懸于十二重天之中央如鷄卵黄在青之中央故日由西照地地必有影射東照東必有影射西夫日輪恒在黄道上若遇望日而月輪亦在黄道上與日正對望則地球障隔日月之間月輪必入地景之内太陽不能照之故失光而食矣漸出地景之外太陽能照之乃漸復得原光也若渾然相對全失光若一分對一分不對對者失光不對者否矣因知月輪失光而食悉由于地景也如上圖甲為日輪乙為地球丙為地影丁為月輪即見日月正對故月輪全居地影之内而居地上者視月無光月無光則食也問日輪值望必與月正相對相對月必過地影過影必當毎望食矣今月之遇食不過什一焉地影之説毋乃碍乎曰日輪恒行黄道上不出入内外地體之影正對于日亦恒在黄道上不出入内外焉月輪惟行龍頭龍尾之上乃行黄道故望時月輪適當龍頭龍尾適過地影之内則食若出黄道内外或南或北地影不便不能食即食亦分秒不同此望日日月雖對而亦不能常食也問日月正對則相逺必百八十度半周天也故月在地平上日必居其下日在地平上月必居其下然有月食而日月皆在地平上則月食非由地影矣何也曰從古至今凡月食皆以望日為限其相逺必半周天不然不食也月食時日月俱在地平上者或日在西以将入月在東以始出或月入而日出也夫月将出而日将入其視月在地平者非月全出也則海水或濕氣所影映也盖地平傍近恒有濕氣清微如煙或空中對月輪偶有輕薄白雲或値當海水皆能令月影映于其内而目力所成宛一月焉此視法之理也固有别論今試于空盤若盤底内置一錢人漸逺于盤或八步或十餘步盤内之錢已不見矣令斟水滿盤即仍八步或十餘步而錢忽見之何也所視非錢體也錢影也然則地平之見月非月體也月影也問月食時刻不同或所食時長或時短何也曰月食長短由于地體之影及月輪之行也月天之内别有小輪以帶月為帶月輪此小輪之動與月天之本動非同一也乃月天行自西而東小輪其上半周行自東而西其下半周行自西而東故月輪近逺于地心恒異也月輪若居小輪之下必近于地若居小輪之上必逺于地也地景漸鋭而有盡其愈近于地愈寛愈至于鋭愈狹若月行小輪之下所經影界寛故食久若行小輪之上所經影界狹故食暫也小輪之説及其上半周何得行自東而西其下半周自西而東别有正論如左圖甲為日輪乙為地形丙為小輪丁為地影漸鋭故影寛于戊而狹于巳月行地影之内在戊小輪之下必久于在巳在巳小輪之上必速于在戊故其時刻長短異也因知二食之時刻長短由于地影及月輪之行也朔日既過月光漸長望日以後其光漸消則月行地平上其光非同也盖月輪毎日自西而東約行十三度朔日以後毎日離日輪亦十三度故朔日日輪入地平而月在日東十三度為三刻未入地也次日又離十三度次日亦然以至于望月與日正相對故日入地下而月出地上也望日以後月漸近于日以至合璧焉因知居地面者其有月光朔日以後毎日多三刻望日以後毎日少三刻欲知毎日多寡試觀左圖第一上圏月日自初一日至第三十日也第二中圏月在地上毎日有光幾刻也第三内圏一刻之分也假如初六日欲知日入以後月光照地幾何刻分視上圏第六日即得第二圏六日正下十九刻與三圏三分問既朔日以後月光漸長又毎日離日輪十三度則第二日日入地平月在日東十三度遠則月髙于地平亦十三度逺自第二日以後宜無不見月光者乃今之見光或在朔後二日或在三日或在四日其不同何也曰其故由于地平及黄道也人居地面而以見月光者必月輪在地平上髙十二度方可得見不然則否盖月之度數有離日輪之度有離地平之度月光之見否由于離地平之髙低不由于離日輪之逺近也故黄道交于地平不同有斜相交有正相交朔時日月同度若其同度在于斜交之宫則居地面者遲見月光也若在于正交之宫則速見其光也視上二圖甲乙為地平丙丁為黄道戊為月輪在地平上巳為日輪将入地平第一圖乃甲乙地平斜相交于丙丁黄道戊月輪雖離巳日輪十三度或十五度乃其髙于地平非十二度故合朔之次日其月雖離日輪十三餘度因未至地平十二度髙故居地面者第二日不能見其光或在第三第四日之間也第二圖甲乙地平乃正相交于黄道戊月輪之離日輪及地平並同也故均為行十三度而其第二日已髙于地平十二度故得即見月光云又月因有逆順行亦有離太陽遲速逆行時必遲離太陽順行時必速離太陽此其故也天問畧
